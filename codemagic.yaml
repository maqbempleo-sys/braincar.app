workflows:
  default-workflow:
    name: CarBrain Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
    scripts:
      - name: Forzar creacion de proyecto Flutter Android Moderno
        script: |
          rm -rf android
          flutter create . --platforms=android --org com.carbrain
      - name: Descargar dependencias del proyecto
        script: |
          flutter packages pub get
      - name: Compilar APK en modo Release
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - maqbempleo@gmail.com
